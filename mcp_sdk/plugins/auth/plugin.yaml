name: auth
version: 1.0.0
description: Core Authentication and RBAC plugin
author: core-team
entrypoint: plugin:Plugin
isolation: local
permissions:
  - internal
tools:
  - name: create_token
    description: Generate a JWT access token
    tags: ["auth", "security"]
  - name: verify_token
    description: Verify a JWT access token
    tags: ["auth", "security"]
  - name: check_permission
    description: Validate user permissions against RBAC policy
    tags: ["auth", "rbac", "security"]
  - name: assign_role
    description: Assign a role to a user
    tags: ["auth", "rbac", "admin"]
