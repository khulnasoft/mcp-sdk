# Pre-commit hooks definition for MCP SDK
# This file defines hooks that can be used by other projects

- id: mcp-sdk-format
  name: MCP SDK Format
  description: Format code using black and ruff
  entry: uv run
  language: system
  args: [black, ruff, check, --fix]
  files: '^mcp_sdk/.*\.py$|^tests/.*\.py$|^examples/.*\.py$'

- id: mcp-sdk-lint
  name: MCP SDK Lint
  description: Lint code using ruff and mypy
  entry: uv run
  language: system
  args: [ruff, check, mypy, mcp_sdk/]
  files: '^mcp_sdk/.*\.py$'
  pass_filenames: false

- id: mcp-sdk-test
  name: MCP SDK Test
  description: Run tests with pytest
  entry: uv run
  language: system
  args: [pytest, tests/, -v, --no-cov]
  files: '^mcp_sdk/.*\.py$|^tests/.*\.py$'
  pass_filenames: false

- id: mcp-sdk-security
  name: MCP SDK Security Check
  description: Run security checks with bandit
  entry: uv run
  language: system
  args: [bandit, -c, pyproject.toml, -r, mcp_sdk/]
  files: '^mcp_sdk/.*\.py$'
  pass_filenames: false
